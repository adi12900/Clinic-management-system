services:
  - type: web
    name: clinic-management-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: clinic-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: clinic-db
    plan: free
