<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Appointments – ClinicCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="assets/css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="dashboard-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <i class="fa-solid fa-staff-snake"></i>
      <span>ClinicCare</span>
    </div>
    <ul class="sidebar-nav">
      <li class="nav-section">MAIN MENU</li>
      <li><a href="patient-dashboard.html"><i class="fa fa-th-large"></i> Dashboard</a></li>
      <li><a href="patient-book-appointment.html"><i class="fa fa-calendar-plus"></i> Book Appointment</a></li>
      <li><a href="patient-appointments.html" class="active"><i class="fa fa-calendar-check"></i> My Appointments</a></li>
      <li class="nav-section">ACCOUNT</li>
      <li><a href="patient-profile.html"><i class="fa fa-user-circle"></i> My Profile</a></li>
      <li class="logout-link"><a href="#" onclick="doLogout()"><i class="fa fa-right-from-bracket"></i> Logout</a></li>
    </ul>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <main class="main-content">
    <div class="topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
        <h1 class="page-title">My Appointments</h1>
      </div>
      <div class="user-info">
        <div class="avatar" id="userAvatar">--</div>
        <span class="fw-semibold" id="userEmail">Loading...</span>
      </div>
    </div>

    <div class="dashboard-body">
      <div id="pageAlert" class="alert d-none mb-3"></div>

      <!-- Filter + Book Button -->
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
        <div class="btn-group" role="group">
          <input type="radio" class="btn-check" name="filter" id="f-all" checked onchange="applyFilter('all')"/>
          <label class="btn btn-outline-primary" for="f-all">All</label>
          <input type="radio" class="btn-check" name="filter" id="f-scheduled" onchange="applyFilter('scheduled')"/>
          <label class="btn btn-outline-primary" for="f-scheduled">Scheduled</label>
          <input type="radio" class="btn-check" name="filter" id="f-completed" onchange="applyFilter('completed')"/>
          <label class="btn btn-outline-primary" for="f-completed">Completed</label>
          <input type="radio" class="btn-check" name="filter" id="f-cancelled" onchange="applyFilter('cancelled')"/>
          <label class="btn btn-outline-primary" for="f-cancelled">Cancelled</label>
        </div>
        <a href="patient-book-appointment.html" class="btn btn-primary">
          <i class="fa fa-plus me-2"></i>Book New Appointment
        </a>
      </div>

      <!-- Appointments Table -->
      <div class="content-card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="fa fa-calendar-check me-2 text-primary"></i>Appointment History</span>
          <span class="badge bg-primary rounded-pill" id="apptCount">0</span>
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr><th>#</th><th>Date</th><th>Doctor</th><th>Specialization</th><th>Status</th><th>Notes</th><th>Actions</th></tr>
            </thead>
            <tbody id="apptTable">
              <tr><td colspan="7" class="text-center text-muted py-4">
                <div class="spinner-border spinner-border-sm me-2"></div>Loading...
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API   = 'http://127.0.0.1:8000';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = 'patient-login.html';

  const email = localStorage.getItem('email') || 'Patient';
  document.getElementById('userEmail').textContent  = email;
  document.getElementById('userAvatar').textContent = email.substring(0,2).toUpperCase();

  let allAppts  = [];
  let doctorMap = {}; // id -> doctor object
  let patientId = null;

  const statusClass = { scheduled:'status-pending', completed:'status-completed', cancelled:'status-cancelled' };

  function authHdr() {
    return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
  }

  function doLogout() { localStorage.clear(); window.location.href = 'patient-login.html'; }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  }

  async function init() {
    // Load doctors into map
    try {
      const dRes = await fetch(`${API}/doctors`, { headers: authHdr() });
      const docs = await dRes.json();
      docs.forEach(d => doctorMap[d.id] = d);
    } catch {}

    // Find patient record by email
    try {
      const pRes  = await fetch(`${API}/patients`, { headers: authHdr() });
      const pats  = await pRes.json();
      const match = pats.find(p => p.email && p.email.toLowerCase() === email.toLowerCase());
      if (match) patientId = match.id;
    } catch {}

    // Load all appointments
    try {
      const res  = await fetch(`${API}/appointments`, { headers: authHdr() });
      if (res.status === 401) { doLogout(); return; }
      const data = await res.json();
      // Filter to only this patient's appointments if patientId found
      allAppts = patientId ? data.filter(a => a.patient_id === patientId) : data;
    } catch {}

    renderTable(allAppts);
  }

  function applyFilter(status) {
    const filtered = status === 'all' ? allAppts : allAppts.filter(a => a.status === status);
    renderTable(filtered);
  }

  function renderTable(data) {
    const tbody = document.getElementById('apptTable');
    document.getElementById('apptCount').textContent = data.length;

    if (!data.length) {
      tbody.innerHTML = `
        <tr><td colspan="7" class="text-center py-5">
          <i class="fa fa-calendar-xmark text-muted mb-2" style="font-size:2.5rem;opacity:.3;"></i>
          <p class="text-muted mb-2">No appointments found.</p>
          <a href="patient-book-appointment.html" class="btn btn-primary btn-sm">
            <i class="fa fa-plus me-1"></i> Book Now
          </a>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = data.map((a, i) => {
      const doc    = doctorMap[a.doctor_id];
      const docName = doc ? doc.name : `Doctor #${a.doctor_id}`;
      const docSpec = doc ? doc.specialization : '—';
      const initials = docName.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      const canCancel = a.status === 'scheduled';

      return `
        <tr>
          <td>${i + 1}</td>
          <td><div class="fw-semibold">${a.appointment_date}</div></td>
          <td>
            <div class="d-flex align-items-center gap-2">
              <div class="avatar bg-primary" style="width:34px;height:34px;font-size:.75rem;">${initials}</div>
              <span>${docName}</span>
            </div>
          </td>
          <td>${docSpec}</td>
          <td><span class="badge-status ${statusClass[a.status] || 'status-pending'}">${a.status}</span></td>
          <td>${a.notes || '—'}</td>
          <td>
            ${canCancel ? `
              <button class="btn btn-action btn-outline-danger" onclick="cancelAppointment(${a.id})">
                <i class="fa fa-times"></i> Cancel
              </button>` : ''}
            ${a.status === 'cancelled' ? `
              <a href="patient-book-appointment.html" class="btn btn-action btn-outline-primary">
                <i class="fa fa-redo"></i> Rebook
              </a>` : ''}
            ${a.status === 'completed' ? `<span class="text-muted small">Completed</span>` : ''}
          </td>
        </tr>`;
    }).join('');
  }

  async function cancelAppointment(id) {
    if (!confirm('Are you sure you want to cancel this appointment?')) return;

    // Fetch full appointment to PUT back with cancelled status
    const getRes = await fetch(`${API}/appointments/${id}`, { headers: authHdr() });
    const appt   = await getRes.json();

    const res = await fetch(`${API}/appointments/${id}`, {
      method: 'PUT',
      headers: authHdr(),
      body: JSON.stringify({
        patient_id:       appt.patient_id,
        doctor_id:        appt.doctor_id,
        appointment_date: appt.appointment_date,
        status:           'cancelled',
        notes:            appt.notes || null
      })
    });

    const alertEl = document.getElementById('pageAlert');
    if (res.ok) {
      alertEl.className = 'alert alert-success';
      alertEl.textContent = 'Appointment cancelled successfully.';
      alertEl.classList.remove('d-none');
      await init(); // reload
    } else {
      alertEl.className = 'alert alert-danger';
      alertEl.textContent = 'Failed to cancel appointment.';
      alertEl.classList.remove('d-none');
    }
    setTimeout(() => alertEl.classList.add('d-none'), 3000);
  }

  init();
</script>
</body>
</html>
