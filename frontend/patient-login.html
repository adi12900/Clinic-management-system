<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patient Login – ClinicCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0F1E; --accent: #00D4AA; --accent2: #00b38f;
      --card-bg: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
      --text: #FFFFFF; --muted: rgba(255,255,255,0.55);
    }
    html, body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; overflow-x: hidden; }

    /* Background glow blobs */
    body::before, body::after { content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    body::before { width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%); top: -100px; left: -100px; }
    body::after  { width: 400px; height: 400px; background: radial-gradient(circle, rgba(108,99,255,0.07) 0%, transparent 70%); bottom: -80px; right: -80px; }

    .card { position: relative; z-index: 1; background: rgba(13,20,38,0.9); border: 1px solid var(--border); backdrop-filter: blur(20px); border-radius: 20px; width: 100%; max-width: 440px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5); animation: fadeUp 0.4s ease both; }

    /* Card header */
    .card-header { background: linear-gradient(135deg, #00D4AA 0%, #007a63 60%, #0A0F1E 100%); padding: 36px 32px; text-align: center; position: relative; overflow: hidden; }
    .card-header::after { content: ''; position: absolute; right: -40px; top: -40px; width: 140px; height: 140px; background: rgba(255,255,255,0.06); border-radius: 50%; }
    .header-icon { width: 72px; height: 72px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 16px; }
    .card-header h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .card-header p { font-size: 13px; color: rgba(255,255,255,0.65); }

    /* Card body */
    .card-body { padding: 32px; }

    /* Alert */
    .alert { padding: 11px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; margin-bottom: 20px; display: none; }
    .alert.show { display: block; }
    .alert-danger { background: rgba(255,80,80,0.1); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.25); }

    /* Form */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-wrap .icon { position: absolute; left: 14px; color: var(--muted); font-size: 14px; pointer-events: none; }
    .input-wrap input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 11px 14px 11px 40px; font-family: 'Inter', sans-serif; font-size: 14px; transition: border-color 0.2s; width: 100%; outline: none; }
    .input-wrap input:focus { border-color: rgba(0,212,170,0.5); box-shadow: 0 0 0 3px rgba(0,212,170,0.08); }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }
    .btn-eye { position: absolute; right: 12px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 4px; line-height: 1; transition: color 0.2s; }
    .btn-eye:hover { color: var(--text); }

    .form-footer { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .checkbox-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .checkbox-wrap input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .checkbox-wrap span { font-size: 13px; color: var(--muted); }
    .link-forgot { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; }
    .link-forgot:hover { text-decoration: underline; }

    .btn-submit { width: 100%; background: var(--accent); color: #0A0F1E; border: none; padding: 13px; border-radius: 11px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-submit:hover { background: var(--accent2); box-shadow: 0 4px 20px rgba(0,212,170,0.35); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 12px; color: var(--muted); font-weight: 500; }

    .btn-outline { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--muted); padding: 12px; border-radius: 11px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-outline:hover { border-color: rgba(0,212,170,0.4); color: var(--text); background: rgba(0,212,170,0.06); }

    .card-links { display: flex; justify-content: center; gap: 24px; margin-top: 20px; }
    .card-links a { font-size: 13px; color: var(--muted); text-decoration: none; transition: color 0.2s; display: flex; align-items: center; gap: 5px; }
    .card-links a:hover { color: var(--accent); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="header-icon"><i class="fa fa-user"></i></div>
    <h2>Patient Portal</h2>
    <p>Access your appointments and medical records</p>
  </div>
  <div class="card-body">
    <form id="loginForm" novalidate>
      <div class="alert alert-danger" id="loginError"></div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fa fa-envelope icon"></i>
          <input type="email" id="emailInput" placeholder="patient@example.com" required/>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa fa-lock icon"></i>
          <input type="password" id="pwdInput" placeholder="••••••••" required/>
          <button class="btn-eye" type="button" onclick="togglePwd()"><i class="fa fa-eye" id="eyeIcon"></i></button>
        </div>
      </div>

      <div class="form-footer">
        <label class="checkbox-wrap">
          <input type="checkbox" id="remember"/>
          <span>Remember me</span>
        </label>
        <a href="#" class="link-forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit" id="loginBtn">
        <i class="fa fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <div class="divider"><span>OR</span></div>

    <a href="patient-register.html" class="btn-outline">
      <i class="fa fa-user-plus"></i> Register as New Patient
    </a>

    <div class="card-links">
      <a href="login.html"><i class="fa fa-user-doctor"></i> Doctor Portal</a>
      <a href="index.html"><i class="fa fa-home"></i> Home</a>
    </div>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8000';
  if (localStorage.getItem('token')) window.location.href = 'patient-dashboard.html';

  function togglePwd() {
    const inp = document.getElementById('pwdInput'), ico = document.getElementById('eyeIcon');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    ico.className = inp.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
  }

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('pwdInput').value;
    const errEl    = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');
    errEl.classList.remove('show');

    if (!email || !password) { errEl.textContent = 'Please enter email and password.'; errEl.classList.add('show'); return; }

    btn.disabled = true; btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Signing in…';

    try {
      const res  = await fetch(`${API}/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.detail || 'Login failed. Check your credentials.'; errEl.classList.add('show'); return; }
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('role', data.role);
      localStorage.setItem('email', email);
      window.location.href = 'patient-dashboard.html';
    } catch {
      errEl.textContent = 'Cannot reach server. Is the backend running?'; errEl.classList.add('show');
    } finally {
      btn.disabled = false; btn.innerHTML = '<i class="fa fa-right-to-bracket"></i> Sign In';
    }
  });
</script>
</body>
</html>
