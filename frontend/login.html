<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – ClinicCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="assets/css/style.css" rel="stylesheet"/>
  <style>
    body { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); min-height: 100vh; display: flex; align-items: center; }
    .login-card { border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden; }
    .login-left { background: linear-gradient(160deg, #0f1c35 0%, #1a3a6c 100%); padding: 3rem 2rem; color: #fff; }
    .login-right { background: #fff; padding: 2.5rem 2.5rem; }
    .role-btn { border: 2px solid #e2e8f0; border-radius: 10px; padding: .75rem 1rem; cursor: pointer; transition: all .2s; text-align: center; }
    .role-btn:hover, .role-btn.selected { border-color: var(--primary); background: #e7f0ff; }
    .role-btn i { font-size: 1.5rem; color: var(--primary); }
    .role-btn .role-name { font-size: .8rem; font-weight: 700; margin-top: .4rem; color: #4a5568; }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-xl-9 col-lg-10">
      <div class="login-card">
        <div class="row g-0">
          <!-- Left Panel -->
          <div class="col-lg-5 login-left d-flex flex-column justify-content-center">
            <div class="d-flex align-items-center gap-2 mb-4">
              <i class="fa-solid fa-staff-snake fs-3"></i>
              <span class="fw-bold fs-4">ClinicCare</span>
            </div>
            <h3 class="fw-bold mb-2">Welcome Back</h3>
            <p class="text-white-50 mb-4">Sign in to access your clinic dashboard and manage appointments securely.</p>
            <div class="d-flex flex-column gap-3">
              <div class="d-flex align-items-center gap-2">
                <i class="fa fa-shield-halved text-info"></i>
                <small class="text-white-50">JWT Secured Authentication</small>
              </div>
              <div class="d-flex align-items-center gap-2">
                <i class="fa fa-user-lock text-info"></i>
                <small class="text-white-50">Role-based Access Control</small>
              </div>
              <div class="d-flex align-items-center gap-2">
                <i class="fa fa-clock text-info"></i>
                <small class="text-white-50">Session timeout protection</small>
              </div>
            </div>
          </div>
          <!-- Right Panel -->
          <div class="col-lg-7 login-right">
            <h5 class="fw-bold mb-1">Sign in to your account</h5>
            <p class="text-muted small mb-4">Select your role and enter credentials</p>

            <!-- Role Selection -->
            <div class="mb-4">
              <label class="form-label">Select Role</label>
              <div class="row g-2">
                <div class="col-6">
                  <div class="role-btn selected" onclick="selectRole(this,'nurse')" id="role-nurse">
                    <i class="fa fa-user-nurse"></i>
                    <div class="role-name">Nurse</div>
                  </div>
                </div>
                <div class="col-6">
                  <div class="role-btn" onclick="selectRole(this,'doctor')" id="role-doctor">
                    <i class="fa fa-user-doctor"></i>
                    <div class="role-name">Doctor</div>
                  </div>
                </div>
              </div>
            </div>

            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-white"><i class="fa fa-envelope text-muted"></i></span>
                  <input type="email" class="form-control" placeholder="you@clinic.com" required/>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-white"><i class="fa fa-lock text-muted"></i></span>
                  <input type="password" class="form-control" id="pwdInput" placeholder="••••••••" required/>
                  <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()">
                    <i class="fa fa-eye" id="eyeIcon"></i>
                  </button>
                </div>
              </div>
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember"/>
                  <label class="form-check-label small" for="remember">Remember me</label>
                </div>
                <a href="#" class="text-primary small text-decoration-none">Forgot password?</a>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" onclick="doLogin(event)">
                <i class="fa fa-right-to-bracket me-2"></i>Sign In
              </button>
            </form>

            <p class="text-center text-muted small mt-4 mb-0">
              <a href="index.html" class="text-decoration-none text-muted">
                <i class="fa fa-arrow-left me-1"></i>Back to Home
              </a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let selectedRole = 'nurse';
  function selectRole(el, role) {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedRole = role;
  }
  function togglePwd() {
    const inp = document.getElementById('pwdInput');
    const ico = document.getElementById('eyeIcon');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    ico.className = inp.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
  }
  function doLogin(e) {
    e.preventDefault();
    window.location.href = selectedRole === 'nurse' ? 'nurse-dashboard.html' : 'doctor-dashboard.html';
  }
</script>
</body>
</html>
